          #   -d '{"text":"❌ Customer Churn deployment FAILED. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          name "$PROD_ENDPOINT_NAME" \
            --region ${{ env.AWS_REGION }}
          echo "Endpoint is InService!"

      # Production smoke test
      - name: Production smoke test
        run: |
          ENDPOINT_URL=$(cd terraform/environments/prod && terraform output -raw api_endpoint)
          echo "Testing Prod Endpoint: $ENDPOINT_URL"

          RESULT=$(curl -s -X POST "$ENDPOINT_URL" \
