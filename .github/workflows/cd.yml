# ═══════════════════════════════════════════════════════════════
# CD Pipeline - Deploy on merge to main
#
# DEPLOYMENT CHAIN:
#   1. Build & push containers to ECR (tagged with git SHA)
#   2. Package & upload Lambda code to S3
#   3. Train model (SageMaker training job)
#   4. Package model artifact → S3
#   5. Terraform apply to DEV (automatic)
#   6. Smoke test DEV endpoint
#   7. Terraform apply to STAGING (automatic)
#   8. Integration test STAGING
#   9. Manual approval gate
#  10. Terraform apply to PROD (after approval)
#  11. Canary health check (10 min)
#  12. Notify team on success/failure
#
# TOTAL TIME: ~45 minutes (training is the bottleneck)
# ═══════════════════════════════════════════════════════════════

name: CD - Build, Train & Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.10"
  TERRAFORM_VERSION: "1.7.0"

# Only one deployment at a time (prevent race conditions)
concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build & Push Containers
  # Tags with both :latest and :git-sha for immutable references
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build + push training container
      - name: Build & push training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/training/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/customer-churn-dev-training:v${{ steps.meta.outputs.sha_short }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/customer-churn-dev-training:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/customer-churn-prod-codemon-99-training:v${{ steps.meta.outputs.sha_short }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/customer-churn-prod-codemon-99-training:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build + push inference image
      - name: Build & push inference image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/inference/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/customer-churn-dev-inference:v${{ steps.meta.outputs.sha_short }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/customer-churn-dev-inference:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/customer-churn-prod-codemon-99-inference:v${{ steps.meta.outputs.sha_short }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/customer-churn-prod-codemon-99-inference:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Package & Upload Lambda
  # ─────────────────────────────────────────────────────────────
  package-lambda:
    name: Package Lambda Functions
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Package predict Lambda
      - name: Package predict Lambda
        run: |
          mkdir -p /tmp/lambda-predict
          cp src/serving/lambda_handler.py /tmp/lambda-predict/
          pip install boto3 -t /tmp/lambda-predict/ --quiet
          cd /tmp/lambda-predict && zip -r /tmp/predict.zip .

      # Package retrain trigger Lambda
      - name: Package retrain trigger Lambda
        run: |
          mkdir -p /tmp/lambda-retrain
          cp src/serving/retrain_trigger.py /tmp/lambda-retrain/
          pip install boto3 -t /tmp/lambda-retrain/ --quiet
          cd /tmp/lambda-retrain && zip -r /tmp/retrain_trigger.zip .

      # Upload to S3 (Lambda module references these paths)
      - name: Upload Lambda packages to S3
        run: |
          aws s3 cp /tmp/predict.zip s3://customer-churn-dev-models/lambda/predict.zip
          aws s3 cp /tmp/retrain_trigger.zip s3://customer-churn-dev-models/lambda/retrain_trigger.zip

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Train Model
  # Runs training locally in CI (for small models like ours).
  # For large models, swap this with a SageMaker Training Job.
  # ─────────────────────────────────────────────────────────────
  train-model:
    name: Train Model
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Download training data from S3
      - name: Download training data
        run: |
          mkdir -p data
          aws s3 cp s3://customer-churn-dev-data-codemon-99/raw/bank_data.csv data/bank_data.csv

      # Train the model
      - name: Train model
        run: |
          python src/training/train.py \
            --data-path data/bank_data.csv \
            --output-dir models/

      # Validate model metrics meet threshold
      - name: Validate model quality
        run: |
          python -c "
          import json
          with open('models/metrics.json') as f:
              m = json.load(f)
          rf = m['random_forest']
          print(f'RF F1: {rf[\"f1_score\"]:.4f}')
          print(f'RF AUC: {rf[\"auc_roc\"]:.4f}')
          assert rf['f1_score'] >= 0.85, f'F1 {rf[\"f1_score\"]} below 0.85 threshold'
          assert rf['auc_roc'] >= 0.88, f'AUC {rf[\"auc_roc\"]} below 0.88 threshold'
          print('Model quality gates PASSED')
          "

      # Package and upload model artifact
      - name: Package model for SageMaker
        run: |
          cd models/
          tar -czvf model.tar.gz rfc_model.pkl logistic_model.pkl scaler.pkl metrics.json feature_columns.json
          aws s3 cp model.tar.gz s3://customer-churn-dev-models/latest/model.tar.gz
          # Also keep a versioned copy for rollback
          aws s3 cp model.tar.gz s3://customer-churn-dev-models/versions/model-$(date +%Y%m%d-%H%M%S).tar.gz

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-metrics
          path: models/metrics.json

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Deploy to DEV
  # Automatic - no approval needed
  # ─────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build-and-push, package-lambda, train-model]
    environment: dev

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: |
          terraform apply \
            -var-file=terraform.tfvars \
            -auto-approve \
            -input=false

      # Wait for endpoint to be InService
      - name: Wait for endpoint
        run: |
          echo "Waiting for SageMaker endpoint to be InService..."
          aws sagemaker wait endpoint-in-service \
            --endpoint-name customer-churn-dev-endpoint \
            --region ${{ env.AWS_REGION }}
          echo "Endpoint is InService!"

      # Smoke test the deployed endpoint
      - name: Smoke test
        run: |
          ENDPOINT_URL=$(cd terraform/environments/dev && terraform output -raw api_endpoint)
          echo "Testing Prod endpoint: $ENDPOINT_URL"

          # Health check
          HEALTH=$(curl -s "${ENDPOINT_URL%predict}health")
          echo "Health: $HEALTH"

          # Prediction test
          RESULT=$(curl -s -X POST "$ENDPOINT_URL" \
            -H "Content-Type: application/json" \
            -d '{"instances":[[45,3,39,5,1,3,12691,777,11914,1.335,1144,42,1.625,0.061,0.16,0.16,0.15,0.14,0.17]]}')
          echo "Prediction: $RESULT"

          # Validate response has expected fields
          python -c "
          import json
          r = json.loads('$RESULT')
          assert 'predictions' in r, 'Missing predictions'
          assert 'probabilities' in r, 'Missing probabilities'
          assert len(r['predictions']) == 1, 'Expected 1 prediction'
          print('Smoke test PASSED')
          "

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Deploy to PROD
  # Requires manual approval via GitHub Environments
  # ─────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: production
      # This triggers the GitHub approval gate.
      # Configure required reviewers in:
      # Settings → Environments → production → Required reviewers

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

#      # Copy model artifact from dev bucket to prod bucket
