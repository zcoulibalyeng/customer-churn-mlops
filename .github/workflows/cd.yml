      # 2. Promote Lambda packages --
      - name: Promote Lambda packages
        run: |
          aws s3 cp s3://customer-churn-dev-models/lambda/predict.zip \
            s3://customer-churn-prod-codemon-99-models/lambda/predict.zip || echo "Bucket not ready"
          aws s3 cp s3://customer-churn-dev-models/lambda/retrain_trigger.zip \
