          import json
          r = json.loads('$RESULT')
          assert 'predictions' in r, 'Missing predictions'
          assert 'probabilities' in r, 'Missing probabilities'
          assert len(r['predictions']) == 1, 'Expected 1 prediction'
          print('Smoke test PASSED')
          "

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Deploy to PROD
  # Requires manual approval via GitHub Environments
  # ─────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: production
      # This triggers the GitHub approval gate.
      # Configure required reviewers in:
      # Settings → Environments → production → Required reviewers

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

#      # Copy model artifact from dev bucket to prod bucket
#      - name: Promote model to prod
#        run: |
#          # Note: We are using 'dev-models' as the source
#          # but we need to make sure the destination matches your Prod setup.
#          # If Terraform didn't create a 'prod-models' bucket,
#          # you might need to check your prod terraform variables.
#          aws s3 cp \
#            s3://customer-churn-dev-models/latest/model.tar.gz \
#            s3://customer-churn-prod-data-codemon-99/models/latest/model.tar.gz
#
#      # Copy Lambda packages
#      - name: Promote Lambda packages
#        run: |
#          aws s3 cp s3://customer-churn-dev-models/lambda/predict.zip \
#            s3://customer-churn-prod-data-codemon-99/lambda/predict.zip
#          aws s3 cp s3://customer-churn-dev-models/lambda/retrain_trigger.zip \
#            s3://customer-churn-prod-data-codemon-99/lambda/retrain_trigger.zip

      # 1. Promote model (Copy from DEV bucket to PROD bucket)
      - name: Promote model to prod
        run: |
          aws s3 cp \
            s3://customer-churn-dev-models/latest/model.tar.gz \
            s3://customer-churn-prod-codemon-99-models/latest/model.tar.gz || echo "First run: Terraform will create this bucket next"

      # 2. Promote Lambda packages --
      - name: Promote Lambda packages
        run: |
          aws s3 cp s3://customer-churn-dev-models/lambda/predict.zip \
            s3://customer-churn-prod-codemon-99-models/lambda/predict.zip || echo "Bucket not ready"
          aws s3 cp s3://customer-churn-dev-models/lambda/retrain_trigger.zip \
            s3://customer-churn-prod-codemon-99-models/lambda/retrain_trigger.zip || echo "Bucket not ready"

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        run: |
          terraform apply \
            -var-file=terraform.tfvars \
            -auto-approve \
            -input=false

      - name: Wait for endpoint
        run: |
          # 1. Get the name with -no-color to prevent hidden character errors
          PROD_ENDPOINT_NAME=$(cd terraform/environments/prod && terraform output -no-color -raw sagemaker_endpoint)
          echo "Waiting for SageMaker endpoint: $PROD_ENDPOINT_NAME"
          
          # 2. Add the explicit region to the AWS command
          aws sagemaker wait endpoint-in-service \
            --endpoint-name "$PROD_ENDPOINT_NAME" \
            --region ${{ env.AWS_REGION }}
          echo "Endpoint is InService!"

      # Production smoke test
      - name: Production smoke test
        run: |
          ENDPOINT_URL=$(cd terraform/environments/prod && terraform output -raw api_endpoint)
          echo "Testing Prod Endpoint: $ENDPOINT_URL"

          RESULT=$(curl -s -X POST "$ENDPOINT_URL" \
            -H "Content-Type: application/json" \
            -d '{"instances":[[45,3,39,5,1,3,12691,777,11914,1.335,1144,42,1.625,0.061,0.16,0.16,0.15,0.14,0.17]]}')

          python -c "
          import json
          r = json.loads('$RESULT')
          assert 'predictions' in r
          assert r['predictions'][0] in [0, 1]
          print('Production smoke test PASSED')
          "

