  # JOB 6: Notify
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod]
    if: always()

    steps:
      - name: Notify on success
        if: needs.deploy-prod.result == 'success'
        run: |
          echo "Deployment successful!"
          # Add Slack webhook notification here:
